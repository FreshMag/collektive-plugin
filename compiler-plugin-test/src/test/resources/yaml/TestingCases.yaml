suiteName: AggregateIteration
cases:
  - id: It
    code: |-
      fun Aggregate<Int>.entry() {
          %(iterative) {
              %(aggregate)
          }
      }
    warning: true
    message: 'Warning: aggregate function ''%(aggregate)'' called inside a loop with
    no manual alignment operation'
  - id: ItAlign
    code: |-
      fun Aggregate<Int>.entry() {
          %(iterative) {
              alignedOn(0) {
                  %(aggregate)
              }
          }
      }
    warning: false
    message: ''
  - id: ItExtAlign
    code: |-
      fun Aggregate<Int>.entry() {
          alignedOn(0) {
              %(iterative) {
                  %(aggregate)
              }
          }
      }
    warning: true
    message: 'Warning: aggregate function ''%(aggregate)'' called inside a loop with
    no manual alignment operation'
  - id: ItNstFun
    code: |-
      fun Aggregate<Int>.entry() {
         %(iterative) {
              fun Aggregate<Int>.nested() {
                  %(aggregate)
              }
          }
      }
    warning: false
    message: ''
  - id: ItDelegate
    code: |-
      fun delegate(aggr: Aggregate<Int>) {
          aggr.%(aggregate)
      }
      
      fun Aggregate<Int>.entry() {
          %(iterative) {
              aggr(this)
          }
      }
    warning: true
    message: 'Warning: suspicious call of function ''%(aggregate)'' with aggregate argument
    inside a loop with no manual alignment operation'
  - id: ItAlignDelegate
    code: |-
      fun delegate(aggr: Aggregate<Int>) {
          aggr.%(aggregate)
      }
      
      fun Aggregate<Int>.entry() {
          %(iterative) {
              alignedOn(0) {
                  aggr(this)
              }
          }
      }
    warning: false
    message: ''
  - id: ItDelegateAlign
    code: |-
      fun delegate(aggr: Aggregate<Int>) {
          aggr.alignedOn(0) {
              aggr.%(aggregate)
          }
      }
      
      fun Aggregate<Int>.entry() {
         %(iterative) {
              aggr(this)
          }
      }
    warning: false
    message: ''
  - id: DelegateIt
    code: |-
      fun delegate(aggr: Aggregate<Int>) {
          %(iterative) {
              aggr.%(aggregate)
          }
      }
      
      fun Aggregate<Int>.entry() {
          aggr(this)
      }
    warning: true
    message: 'Warning: suspicious call of function ''%(aggregate)'' with aggregate argument
    inside a loop with no manual alignment operation'
  - id: OutsideAggregate
    code: |-
      fun entry() {
        %(iterative) {
          aggregate(0) {
            %(aggregate)
          }
        }
      }
    warning: false
    message: ''
parameters:
  aggregate:
    - neighboring(0)
    - exchange(0) { it }
    - repeat(0) { it + 1 }
  iterative:
    - name: for
      code: for(i in 1..3)
    - name: listOfForEach
      code: listOf(1,2,3).forEach
    - name: listOfMap
      code: listOf(1,2,3).map
